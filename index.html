<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GitHub Foundations Certification Practice Quiz</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --border:#30363d; --text:#e6edf3; --muted:#8b949e;
    --accent:#2f81f7; --green:#238636; --green-bg:#12261e; --green-bd:#2ea043;
    --red:#da3633; --red-bg:#25171c; --red-bd:#f85149; --yellow:#d29922;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--text);line-height:1.5}
  .wrap{max-width:1240px;margin:0 auto;padding:28px clamp(16px,4vw,40px) 80px}
  header{display:flex;align-items:center;gap:12px;margin-bottom:8px}
  header svg{flex:0 0 auto}
  h1{font-size:clamp(18px,2.2vw,22px);margin:0;flex:1}
  .iconbtn{font:inherit;font-size:13px;font-weight:600;background:#21262d;color:var(--text);
    border:1px solid var(--border);border-radius:8px;padding:7px 12px;cursor:pointer;white-space:nowrap}
  .iconbtn:hover{border-color:#8b949e}
  .search{display:flex;gap:8px;margin:4px 0 0}
  .search input{flex:1;font:inherit;font-size:14px;background:var(--panel);color:var(--text);
    border:1px solid var(--border);border-radius:8px;padding:9px 12px}
  .search input:focus{outline:none;border-color:var(--accent)}
  .filternote{font-size:13px;color:var(--muted);margin:10px 0 0;padding:8px 12px;
    background:#0f1c16;border-left:3px solid var(--green-bd);border-radius:6px}
  .filternote.none{background:var(--red-bg);border-left-color:var(--red-bd);color:#f0b0ac}
  .filternote a{color:var(--accent)}
  .layout{display:flex;gap:clamp(20px,3vw,36px);align-items:flex-start;margin-top:18px}
  .main{flex:1;min-width:0}
  .sidebar{flex:0 0 270px;position:sticky;top:18px;max-height:calc(100vh - 96px);overflow:auto;
    background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:16px 14px}
  .side-h{display:flex;align-items:center;gap:8px;margin:2px 4px 12px;padding-bottom:12px;border-bottom:1px solid var(--border)}
  .side-h .ttl{flex:1;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
  .side-h button{font:inherit;font-size:11.5px;font-weight:600;background:#21262d;color:var(--text);
    border:1px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer}
  .side-h button:hover{border-color:#8b949e}
  .sublist{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:3px}
  .sublist label{display:flex;align-items:center;gap:11px;padding:10px 11px;border-radius:9px;cursor:pointer;
    font-size:14px;transition:background .12s}
  .sublist label:hover{background:#0d1117}
  .sublist label.on{background:#10243b}
  .sublist input{width:16px;height:16px;accent-color:var(--accent);flex:0 0 auto;cursor:pointer}
  .sublist .lbl{flex:1;min-width:0;line-height:1.35}
  .sublist .cnt{font-size:11.5px;color:var(--muted);background:#0d1117;border:1px solid var(--border);
    border-radius:999px;padding:1px 9px;line-height:1.5;flex:0 0 auto}
  @media (max-width:1080px){ .sidebar{flex-basis:240px} }
  @media (max-width:860px){
    .layout{flex-direction:column;gap:18px}
    .sidebar{flex:none;width:100%;position:static;max-height:none;order:-1;padding:14px}
    .sublist{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:4px}
  }
  .bar{height:8px;background:var(--panel);border:1px solid var(--border);border-radius:6px;overflow:hidden;margin:16px 0 6px}
  .bar>div{height:100%;background:linear-gradient(90deg,#1f6feb,#2ea043);width:0;transition:width .3s}
  .meta{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--muted);margin-bottom:18px;gap:10px}
  .meta .save{color:var(--green-bd);font-size:12px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:clamp(18px,3vw,32px)}
  .qhead{max-width:860px}
  .qtype{display:inline-block;font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);
    border:1px solid var(--border);border-radius:999px;padding:2px 10px;margin-bottom:14px}
  .qtext{font-size:clamp(17px,1.4vw,20px);font-weight:600;margin:0 0 20px;white-space:pre-wrap;
    max-width:860px;line-height:1.45}
  .options{display:flex;flex-direction:column;gap:11px;max-width:860px}
  .opt{display:flex;gap:12px;align-items:flex-start;border:1px solid var(--border);border-radius:10px;
    padding:13px 14px;cursor:pointer;background:#0d1117;transition:border-color .15s,background .15s}
  .opt:hover{border-color:#484f58}
  .opt input{margin-top:3px;width:17px;height:17px;accent-color:var(--accent);flex:0 0 auto;cursor:pointer}
  .opt .txt{flex:1;white-space:pre-wrap}
  .opt.correct{background:var(--green-bg);border-color:var(--green-bd)}
  .opt.incorrect{background:var(--red-bg);border-color:var(--red-bd)}
  .opt.locked{cursor:default}
  .tag{font-size:11px;font-weight:700;padding:1px 8px;border-radius:999px;margin-left:8px;white-space:nowrap}
  .tag.g{background:var(--green-bd);color:#fff}
  .tag.r{background:var(--red-bd);color:#fff}
  .verdict{margin:16px 0 0;font-weight:700;font-size:16px;display:none}
  .verdict.correct{color:var(--green-bd);display:block}
  .verdict.incorrect{color:var(--red-bd);display:block}
  .reinsert{font-weight:500;color:var(--yellow);font-size:13px;margin-top:4px;display:none}
  .explain{margin-top:14px;padding:12px 14px;border-left:3px solid var(--green-bd);
    background:#0f1c16;border-radius:6px;color:#c9d1d9;font-size:14px;white-space:pre-wrap;display:none}
  .actions{display:flex;gap:12px;margin-top:20px;flex-wrap:wrap}
  button{font:inherit;font-weight:600;border-radius:8px;padding:10px 20px;cursor:pointer;border:1px solid transparent}
  .primary{background:var(--green);color:#fff;border-color:#2ea04366}
  .primary:hover{background:#2ea043}
  .primary:disabled{opacity:.5;cursor:not-allowed}
  .secondary{background:#21262d;color:var(--text);border-color:var(--border)}
  .secondary:hover{border-color:#8b949e}
  .hint{color:var(--muted);font-size:13px;margin-top:10px}
  @media (max-width:560px){
    header{flex-wrap:wrap}
    .opt{padding:14px}
    .actions{gap:10px}
    .actions button{flex:1 1 auto}
  }
  .resume h2{margin:0 0 8px}
  .resume p{color:var(--muted);margin:0 0 18px}
  /* count slider */
  .setup{padding:8px 4px 4px}
  .setup .lead{color:var(--muted);margin:0 0 18px}
  .countbox{background:#0d1117;border:1px solid var(--border);border-radius:12px;padding:20px 22px;margin:0 0 22px;max-width:560px}
  .countbox .row{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:14px}
  .countbox .lbl{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .countbox .val{font-size:30px;font-weight:800;color:var(--accent)}
  .countbox .val small{font-size:14px;font-weight:600;color:var(--muted)}
  input[type=range].slider{-webkit-appearance:none;appearance:none;width:100%;height:8px;border-radius:6px;
    background:var(--border);outline:none;margin:6px 0 4px;cursor:pointer}
  input[type=range].slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:22px;height:22px;
    border-radius:50%;background:var(--accent);border:3px solid #0d1117;cursor:pointer;box-shadow:0 0 0 1px var(--accent)}
  input[type=range].slider::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--accent);
    border:3px solid #0d1117;cursor:pointer}
  .ticks{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:2px}
  .ticks span{cursor:pointer;padding:2px 4px;border-radius:4px}
  .ticks span:hover{color:var(--text);background:#161b22}
  .ticks span.on{color:var(--accent);font-weight:700}
  /* improvement areas */
  .focusbanner{display:flex;align-items:center;gap:12px;flex-wrap:wrap;font-size:14px;color:#cfe3ff;
    margin:12px 0 0;padding:10px 14px;background:#0d1f33;border-left:3px solid var(--accent);border-radius:8px}
  .focusbanner button{margin-left:auto}
  .misslist{list-style:decimal;margin:6px 0 22px;padding-left:24px;max-width:760px;
    max-height:340px;overflow:auto;display:flex;flex-direction:column;gap:10px}
  .misslist li{color:#c9d1d9;line-height:1.4}
  .misslist li .mtype{font-size:11px;color:var(--yellow);text-transform:uppercase;letter-spacing:.04em;margin-left:6px}
  .emptybox{color:var(--muted);background:#0d1117;border:1px dashed var(--border);border-radius:10px;padding:22px;text-align:center}
  /* summary */
  .summary{text-align:center;padding:30px 22px}
  .summary h2{margin:0 0 18px;font-size:24px}
  .score{font-size:56px;font-weight:800;margin:6px 0}
  .score.good{color:var(--green-bd)} .score.mid{color:var(--yellow)} .score.low{color:var(--red-bd)}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin:22px 0}
  .stat{background:#0d1117;border:1px solid var(--border);border-radius:10px;padding:14px}
  .stat .n{font-size:24px;font-weight:700}
  .stat .l{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .footer{color:var(--muted);font-size:12px;text-align:center;margin-top:30px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <svg height="30" width="30" viewBox="0 0 16 16" fill="#e6edf3"><path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"></path></svg>
    <h1>GitHub Foundations Certification Practice Quiz</h1>
    <button id="improveBtn" class="iconbtn" style="display:none" title="Review and practice the questions you missed">⚑ Improvement areas</button>
    <button id="restartBtn" class="iconbtn" style="display:none" title="Start the quiz over">↻ Restart</button>
  </header>

  <div class="search">
    <input id="searchInput" type="search" autocomplete="off"
      placeholder="🔍 Filter by topic — e.g. pull request, Actions, billing — then press Enter">
    <button id="searchClear" class="iconbtn" style="display:none" title="Show all questions">Clear</button>
  </div>
  <div id="filterNote" class="filternote" style="display:none"></div>

  <div class="layout">
    <aside class="sidebar">
      <div class="side-h">
        <span class="ttl">Subjects</span>
        <button id="subAll" title="Select every subject">All</button>
        <button id="subClear" title="Clear selection">Clear</button>
      </div>
      <ul id="subList" class="sublist"></ul>
    </aside>

    <div class="main">
      <div class="bar"><div id="prog"></div></div>
      <div class="meta">
        <span id="counter"></span>
        <span id="saveState" class="save"></span>
        <span id="remaining"></span>
      </div>

      <div id="quiz" class="card"></div>
    </div>
  </div>
</div>

<script>
const QUESTIONS = [{"question": "What happens if you lose internet connectivity while using a Codespace?", "type": "single", "options": [{"text": "If the connection to the internet is lost while working in a Codespace, edit access is lost until connectivity is recovered.", "correct": true}, {"text": "Codespaces don't require an internet connection. You can access your Codespace regardless of connectivity.", "correct": false}, {"text": "If you lose internet connection while working on your Codespace, your unsaved changes are lost.", "correct": false}, {"text": "Nothing happens. Everything is always saved regardless of internet access.", "correct": false}], "explanation": "A Codespace is a remote development environment and requires an active internet connection to interact with it. If the internet connection is lost, the environment remains until a connection is reestablished. Changes are stored within the remote environment until committed and"}, {"question": "What's the maximum number of Codespaces that you can create per repository or branch?", "type": "single", "options": [{"text": "You can only create two Codespaces.", "correct": false}, {"text": "You can create a total of ten Codespaces.", "correct": false}, {"text": "You can create a total of thirty Codespaces.", "correct": false}, {"text": "You can create an unlimited number of Codespaces.", "correct": true}], "explanation": "You can create an unlimited number of Codespaces per repository or branch assuming there is available storage."}, {"question": "What are the different options that allow you to automate operations in your GitHub Project?", "type": "multiple", "options": [{"text": "GitHub Charts", "correct": false}, {"text": "GitHub Dependabot", "correct": false}, {"text": "GitHub GraphQL API", "correct": true}, {"text": "Project workflows", "correct": true}, {"text": "Project items", "correct": false}, {"text": "GitHub Copilot", "correct": false}, {"text": "GitHub Actions", "correct": true}], "explanation": null}, {"question": "What is a good way to make sure you're integrating the most secure versions of your project dependencies?", "type": "single", "options": [{"text": "Configure your package files to always use the latest versions of dependencies.", "correct": false}, {"text": "Check each project's security details closely before adding it to your dependencies by confirming its version status across multiple advisory sites.", "correct": false}, {"text": "Enable Dependabot for your repository.", "correct": true}, {"text": "Enable repository dependency graph alerts.", "correct": false}], "explanation": "Dependabot scans your repository's dependency manifests and notifies you via an alert and pull request whenever a utilized version or upstream dependency is discovered as insecure."}, {"question": "Which of the following roles are available for a repository at the organization level on GitHub?", "type": "multiple", "options": [{"text": "Delete", "correct": false}, {"text": "Write", "correct": true}, {"text": "Read", "correct": true}, {"text": "Triage", "correct": true}, {"text": "Admin", "correct": true}, {"text": "Maintain", "correct": true}], "explanation": null}, {"question": "What is the difference between a GitHub organization account and a GitHub personal/user account?", "type": "single", "options": [{"text": "An organization account is intended for multiple people and teams, while personal/user accounts are typically for individuals.", "correct": true}, {"text": "You pay more for organization accounts versus personal/user accounts.", "correct": false}, {"text": "They are exactly the same.", "correct": false}, {"text": "Personal/ user accounts have more access than organization accounts.", "correct": false}], "explanation": "Organizations are shared accounts where an unlimited number of people can collaborate across many projects at once and with tiered permissions."}, {"question": "How does GitHub help people that want to write proper issue and pull request comments but don't know Markdown syntax?", "type": "single", "options": [{"text": "There is a text formatting toolbar on issue and pull request comment forms which generates Markdown for you.", "correct": true}, {"text": "GitHub pull requests and issues don't support Markdown.", "correct": false}, {"text": "GitHub automatically converts HTML to Markdown in issue and pull request comments.", "correct": false}, {"text": "By providing a Markdown cheat sheet.", "correct": false}], "explanation": null}, {"question": "What is the GitHub Marketplace?", "type": "single", "options": [{"text": "A place where you can purchase more GitHub seats for your organization.", "correct": false}, {"text": "A place to upgrade your GitHub plan.", "correct": false}, {"text": "A place where you can meet Sponsors to help sponsor your project.", "correct": false}, {"text": "A place for discovering and installing additional functionality for GitHub.", "correct": true}], "explanation": "The GitHub Marketplace offers various community developed resources such as applications, Actions, and extensions to add additional functionality to GitHub."}, {"question": "You have been requested to review a pull request. As you read through it, you notice several minor coding errors and typos. How should you handle the review?", "type": "single", "options": [{"text": "Start a review and fix obvious typos inline. Add comments in places that require further discussion or offer educational value. Complete the review with changes requested.", "correct": true}, {"text": "Leave single comments for each issue you come across, but do not change the code. For typos, include the correct spelling of the word as a reference. Approve the pull request if you trust the author to implement your suggestions.", "correct": false}, {"text": "Reject the pull request. We can't risk any bugs accidentally being merged into an important branch.", "correct": false}], "explanation": "Contributors always appreciate when reviewers show an interest in getting their code merged. While every project has its own contribution"}, {"question": "What is InnerSource?", "type": "single", "options": [{"text": "InnerSource refers to the practice of applying open source principles within an organization", "correct": true}, {"text": "InnerSource refers to the practice of applying open source principles in personal projects", "correct": false}, {"text": "InnerSource refers to the internal knowledge base of an organization about the project they are working on.", "correct": false}, {"text": "InnerSource is a tool that allows organizations to see what open source projects they are using in their code.", "correct": false}], "explanation": null}, {"question": "What GitHub feature allows the creation of preconfigured development environments where all necessary tools and dependencies to contribute to a repository are installed?", "type": "single", "options": [{"text": "GitHub DevEnv", "correct": false}, {"text": "GitHub Copilot", "correct": false}, {"text": "GitHub Docker", "correct": false}, {"text": "GitHub Codespaces", "correct": true}], "explanation": null}, {"question": "In Git, what is a \"commit\" used for?", "type": "single", "options": [{"text": "A remote server where code is stored.", "correct": false}, {"text": "A record of changes to a repository's history.", "correct": true}, {"text": "An external plugin to integrate with other services.", "correct": false}, {"text": "A summary of issues and bugs in a project.", "correct": false}], "explanation": "A \"commit\" is a snapshots of your entire repository at specific times"}, {"question": "In Git terminology, what is a \"remote\"?", "type": "single", "options": [{"text": "A local copy of a repository stored on your computer.", "correct": false}, {"text": "A separate branch used for experimental code.", "correct": false}, {"text": "A backup of your repository stored in a secure location.", "correct": false}, {"text": "A repository that tracks the same project but resides somewhere else.", "correct": true}], "explanation": "Remotes are references to other repositories for collaboration and synchronization."}, {"question": "Which search query finds all open issues labeled test that mention 'fix' in their body text?", "type": "single", "options": [{"text": "type:issue label:test is:open body:\"fix\"", "correct": false}, {"text": "is:issue in:comments label:test \"fix\"", "correct": false}, {"text": "is:pr is:open label:test \"fix\"", "correct": false}, {"text": "is:issue is:open label:test \"fix\"", "correct": true}], "explanation": null}, {"question": "Which feature in GitHub Projects enables you to effortlessly generate graphs and charts for visualizing the current status and historical progression of your project?", "type": "single", "options": [{"text": "Project Insights", "correct": true}, {"text": "GitHub Actions", "correct": false}, {"text": "Copilot Charts", "correct": false}, {"text": "Milestones", "correct": false}], "explanation": null}, {"question": "What's the difference between Git and GitHub?", "type": "single", "options": [{"text": "Git is a distributed version control system (DVCS) that runs locally. GitHub is an interface layer that provides a shared remote.", "correct": true}, {"text": "Git is version control for projects with one contributor. GitHub is version control for projects with multiple contributors.", "correct": false}, {"text": "Git and GitHub are the same.", "correct": false}, {"text": "Git is local version control. GitHub is remote version control.", "correct": false}], "explanation": "Git is the tool you can use to work with a local branch and push changes to a remote repository. GitHub acts as a remote repository."}, {"question": "What is the difference between an issue, discussion, and pull request in GitHub?", "type": "single", "options": [{"text": "All three terms refer to the same thing in GitHub.", "correct": false}, {"text": "An issue is a way to discuss code changes, discussions are mitted.", "correct": false}, {"text": "It's a practice where every time a commit is pushed to the main branch, a new release is automatically created and deployed.", "correct": false}, {"text": "It refers to a branch-based workflow where developers create a branch for each new change they're working on, and then open pull requests to get their code reviewed, tested, and merged into the main branch.", "correct": true}, {"text": "It's a practice where every time a commit is pushed to the main branch, a set of CI/CD pipelines are triggered to run tests and validate the code changes.", "correct": false}], "explanation": null}, {"question": "Which of the below is a valid way to prompt GitHub Copilot for a suggestion in the IDE?", "type": "single", "options": [{"text": "Type a code comment or text in a markdown file. Wait for a suggestion to appear. Press the ‘Tab’ key to accept the suggestion.", "correct": true}, {"text": "Navigate to github.com, select the Copilot Chat window and enter a question.", "correct": false}, {"text": "Highlight the code with your mouse. Open the command palette, select the ‘GitHub Copilot’ option, and enter your prompt into the chat box.", "correct": false}, {"text": "Copilot cannot be prompted for suggestions. It automatically provides suggestions.", "correct": false}], "explanation": "Copilot uses several context areas for prompting for a suggestion. One of them is pauses in code editing activity in the IDE. There are also options for inline chat and in a side chat panel. https://docs.github.com/en/copilot/using"}, {"question": "What are the different levels of GitHub organizational hierarchy?", "type": "multiple", "options": [{"text": "Organization level", "correct": true}, {"text": "Team level", "correct": true}, {"text": "Enterprise level", "correct": true}, {"text": "Pro level", "correct": false}, {"text": "Personal level", "correct": false}], "explanation": null}, {"question": "How can you define guiding protocols for users intending to const STORE_KEY = "ghCertQuizProgress_v1";

// active = the set currently being quizzed (all questions, or a topic-filtered subset)
let ACTIVE = QUESTIONS;
let filterActive = false;

// signature so saved progress is invalidated if the question set changes after a rebuild
function signature(){
  let s = ACTIVE.length + ":";
  for(const q of ACTIVE){ s += (q.question||"").slice(0,24); }
  let h=0; for(let i=0;i<s.length;i++){ h=(h*31 + s.charCodeAt(i))|0; }
  return ACTIVE.length + "_" + (h>>>0).toString(36);
}
const SIG = signature();

// ---- state ----
let queue = [];
let total = QUESTIONS.length;
let attempts = 0;
let correctAttempts = 0;
let firstCorrect = 0;
let firstSeen = new Set();
let answeredUnique = new Set();
let current = null;
let locked = false;
let missedFirst = new Set();   // ids missed on first attempt = "improvement areas"
let focusActive = false;       // focused practice on missed questions (not persisted)
let chosenCount = 0;           // 0 = all of ACTIVE

function transient(){ return filterActive || focusActive; }
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

// ---- persistence ----
function saveProgress(phase){
  if(transient()) return;            // filtered / focused runs are not persisted
  try{
    const snap = {
      sig: SIG, phase, total,
      queue: queue.map(q=>q.id),
      current: current ? current.id : null,
      attempts, correctAttempts, firstCorrect,
      firstSeen:[...firstSeen], answeredUnique:[...answeredUnique],
      missed:[...missedFirst],
      firstAttempt: QUESTIONS.map(q=>q.firstAttempt?1:0),
      ts: Date.now()
    };
    localStorage.setItem(STORE_KEY, JSON.stringify(snap));
    flashSaved();
  }catch(e){}
}
function loadProgress(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(!raw) return null;
    const s = JSON.parse(raw);
    if(s.sig !== SIG) return null;            // question set changed -> ignore old save
    if(!s.queue || (s.queue.length===0 && (s.current===null))) return null;
    return s;
  }catch(e){ return null; }
}
function clearProgress(){ try{ localStorage.removeItem(STORE_KEY); }catch(e){} }
let _saveTimer=null;
function flashSaved(){
  const el=document.getElementById('saveState');
  el.textContent="✓ progress saved";
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>{el.textContent="";},1500);
}

function updateImproveBtn(){
  const b=document.getElementById('improveBtn');
  if(!b) return;
  const n=missedFirst.size;
  b.textContent = n ? `⚑ Improvement areas (${n})` : '⚑ Improvement areas';
}

// ---- lifecycle ----
function boot(){
  QUESTIONS.forEach((q,i)=>{ q.id=i; q.firstAttempt=true; });
  const saved = loadProgress();
  if(saved){ showResume(saved); } else { freshStart(); }
}

// fresh start now opens the setup screen so the user can pick how many questions
function freshStart(){
  if(!transient()) clearProgress();
  focusActive=false; setFocusBanner(false);
  missedFirst=new Set(); updateImproveBtn();
  showSetup();
}

// build the list of selectable sizes in steps of 25, with an "All" stop at the end
function sizeStops(n){
  const stops=[];
  for(let v=25; v<n; v+=25) stops.push(v);
  stops.push(n); // final stop = all questions
  return stops;
}

function showSetup(){
  const pool = ACTIVE.length;
  const stops = sizeStops(pool);
  let idx = stops.length-1;            // default to "All"
  document.getElementById('restartBtn').style.display='none';
  document.getElementById('improveBtn').style.display='none';
  document.getElementById('counter').textContent='';
  document.getElementById('remaining').textContent='';
  document.getElementById('saveState').textContent='';
  document.getElementById('prog').style.width='0%';
  const ticks = stops.map((v,i)=>`<span data-i="${i}">${i===stops.length-1?'All':v}</span>`).join('');
  document.getElementById('quiz').innerHTML=`
    <div class="setup">
      <h2 style="margin:0 0 6px">Set up your practice test</h2>
      <p class="lead">Choose how many questions you want. The slider locks to steps of 25.</p>
      <div class="countbox">
        <div class="row">
          <span class="lbl">Questions in this test</span>
          <span class="val" id="cntVal"></span>
        </div>
        <input type="range" class="slider" id="cntSlider" min="0" max="${stops.length-1}" step="1" value="${idx}">
        <div class="ticks" id="cntTicks">${ticks}</div>
      </div>
      <div class="actions">
        <button class="primary" id="startBtn">Start quiz →</button>
      </div>
      <div class="hint">${pool} unique questions available. A random selection is drawn each time.</div>
    </div>`;
  const slider=document.getElementById('cntSlider');
  const valEl=document.getElementById('cntVal');
  const tickEls=[...document.querySelectorAll('#cntTicks span')];
  function paint(){
    const i=+slider.value;
    const v=stops[i];
    const all=(i===stops.length-1);
    valEl.innerHTML = all ? `${v} <small>(all)</small>` : `${v}`;
    tickEls.forEach(t=>t.classList.toggle('on',+t.dataset.i===i));
  }
  slider.addEventListener('input',paint);
  tickEls.forEach(t=>t.addEventListener('click',()=>{ slider.value=t.dataset.i; paint(); }));
  document.getElementById('startBtn').addEventListener('click',()=>{
    const i=+slider.value;
    beginTest(i===stops.length-1 ? 0 : stops[i]);
  });
  paint();
}

function beginTest(count){
  chosenCount = count;
  attempts=0;correctAttempts=0;firstCorrect=0;
  firstSeen=new Set();answeredUnique=new Set();current=null;locked=false;
  ACTIVE.forEach(q=>q.firstAttempt=true);
  let pool = shuffle(ACTIVE.slice());
  if(count && count < pool.length) pool = pool.slice(0,count);
  queue = pool;
  total = queue.length;
  document.getElementById('restartBtn').style.display='inline-block';
  document.getElementById('improveBtn').style.display='inline-block';
  updateImproveBtn();
  next();
}

function showResume(s){
  const mastered = s.answeredUnique.length;
  const stotal = s.total || ACTIVE.length;
  const date = new Date(s.ts||Date.now());
  document.getElementById('restartBtn').style.display='none';
  document.getElementById('improveBtn').style.display='none';
  document.getElementById('counter').textContent='';
  document.getElementById('remaining').textContent='';
  document.getElementById('prog').style.width = (stotal?mastered/stotal*100:0)+'%';
  document.getElementById('quiz').innerHTML=`
    <div class="resume">
      <h2>Welcome back 👋</h2>
      <p>You have a saved session from ${date.toLocaleString()} —
         <strong>${mastered}/${stotal}</strong> mastered, ${s.queue.length} still in the queue.</p>
      <div class="actions">
        <button class="primary" id="resumeBtn">Resume where I left off</button>
        <button class="secondary" id="freshBtn">Start over</button>
      </div>
    </div>`;
  document.getElementById('resumeBtn').addEventListener('click',()=>resume(s));
  document.getElementById('freshBtn').addEventListener('click',freshStart);
}

function resume(s){
  attempts=s.attempts; correctAttempts=s.correctAttempts; firstCorrect=s.firstCorrect;
  firstSeen=new Set(s.firstSeen); answeredUnique=new Set(s.answeredUnique);
  missedFirst=new Set(s.missed||[]);
  QUESTIONS.forEach((q,i)=>{ q.firstAttempt = s.firstAttempt ? !!s.firstAttempt[i] : true; });
  const byId = id => QUESTIONS[id];
  queue = (s.queue||[]).map(byId);
  total = s.total || ACTIVE.length;
  focusActive=false; setFocusBanner(false);
  document.getElementById('restartBtn').style.display='inline-block';
  document.getElementById('improveBtn').style.display='inline-block';
  updateImproveBtn();
  if(s.phase==='graded'){
    current=null; locked=false; next();
  } else {
    current = s.current!=null ? byId(s.current) : null;
    locked=false;
    if(!current){ next(); } else { render(); updateMeta(); }
  }
}

function updateMeta(){
  const done = answeredUnique.size;
  document.getElementById('counter').textContent = `${done}/${total} mastered`;
  document.getElementById('remaining').textContent = `${queue.length} in queue · ${attempts} attempts`;
  document.getElementById('prog').style.width = (total? (done/total*100):0) + '%';
}

function next(){
  locked=false;
  if(queue.length===0){ return summary(); }
  current = queue.shift();
  if(!firstSeen.has(current.id)){ firstSeen.add(current.id); }
  render();
  updateMeta();
  saveProgress('question');
}

function render(){
  const q=current;
  const inputType = q.type==='multiple' ? 'checkbox':'radio';
  const correctCount = q.options.filter(o=>o.correct).length;
  const opts = shuffle(q.options.map((o,idx)=>({o,idx})));
  let html='';
  const badge = q.type==='multiple'
    ? `Select all that apply${correctCount>1?` — choose ${correctCount}`:''}`
    : 'Select one';
  html += `<span class="qtype">${badge}</span>`;
  html += `<p class="qtext">${esc(q.question)}</p>`;
  html += `<div class="options" id="opts">`;
  opts.forEach(({o,idx})=>{
    html += `<label class="opt" data-i="${idx}">
       <input type="${inputType}" name="opt" value="${idx}">
       <span class="txt">${esc(o.text)}</span>
       <span class="tagslot"></span>
     </label>`;
  });
  html += `</div>`;
  html += `<div id="verdict" class="verdict"></div>`;
  html += `<div id="reinsert" class="reinsert">↻ This question will appear again later.</div>`;
  html += `<div id="explain" class="explain"></div>`;
  html += `<div class="actions">
      <button id="submit" class="primary" disabled>Submit</button>
      <button id="nextBtn" class="secondary" style="display:none">Next →</button>
   </div>
   <div class="hint" id="hint">${q.type==='multiple'?(correctCount>1?`Select ${correctCount} answers.`:'Choose one or more options.'):'Choose one option.'}</div>`;
  document.getElementById('quiz').innerHTML=html;

  const optsEl=document.getElementById('opts');
  optsEl.addEventListener('change',()=>{
    document.getElementById('submit').disabled = optsEl.querySelectorAll('input:checked').length===0;
  });
  document.getElementById('submit').addEventListener('click',grade);
  document.getElementById('nextBtn').addEventListener('click',next);
}

function grade(){
  if(locked) return; locked=true;
  const q=current;
  const optsEl=document.getElementById('opts');
  const labels=[...optsEl.querySelectorAll('.opt')];
  const checked=new Set([...optsEl.querySelectorAll('input:checked')].map(i=>+i.value));
  let allRight=true;
  labels.forEach(lab=>{
    const i=+lab.dataset.i;
    const isCorrect=q.options[i].correct;
    const picked=checked.has(i);
    lab.classList.add('locked');
    lab.querySelector('input').disabled=true;
    const slot=lab.querySelector('.tagslot');
    if(isCorrect){
      lab.classList.add('correct');
      slot.innerHTML = picked? '<span class="tag g">Your answer ✓</span>' : '<span class="tag g">Correct answer</span>';
      if(!picked) allRight=false;
    } else if(picked){
      lab.classList.add('incorrect');
      slot.innerHTML='<span class="tag r">Your answer ✗</span>';
      allRight=false;
    }
  });

  attempts++;
  const wasFirst=q.firstAttempt; q.firstAttempt=false;
  const verdict=document.getElementById('verdict');
  if(allRight){
    correctAttempts++;
    if(wasFirst) firstCorrect++;
    answeredUnique.add(q.id);
    verdict.className='verdict correct';
    verdict.textContent='✓ Correct';
  } else {
    verdict.className='verdict incorrect';
    verdict.textContent='✗ Incorrect';
    if(wasFirst && !transient()){ missedFirst.add(q.id); updateImproveBtn(); }
    const pos=Math.floor(Math.random()*(queue.length+1));
    queue.splice(pos,0,q);
    document.getElementById('reinsert').style.display='block';
  }
  if(q.explanation){
    const ex=document.getElementById('explain');
    ex.textContent=q.explanation; ex.style.display='block';
  }
  document.getElementById('submit').style.display='none';
  const nb=document.getElementById('nextBtn');
  nb.style.display='inline-block';
  nb.textContent = queue.length===0 ? 'See results →' : 'Next →';
  nb.focus();
  document.getElementById('hint').style.display='none';
  updateMeta();
  saveProgress('graded');
}

function summary(){
  if(!transient()) clearProgress();
  document.getElementById('restartBtn').style.display='none';
  document.getElementById('improveBtn').style.display='none';
  const pct = total? Math.round(firstCorrect/total*100):0;
  const overall = attempts? Math.round(correctAttempts/attempts*100):0;
  const cls = pct>=80?'good':pct>=60?'mid':'low';
  document.getElementById('prog').style.width='100%';
  document.getElementById('counter').textContent='Complete';
  document.getElementById('saveState').textContent='';
  document.getElementById('remaining').textContent=`${attempts} total attempts`;

  if(focusActive){
    document.getElementById('quiz').innerHTML=`
      <div class="summary">
        <h2>⚑ Focused practice complete!</h2>
        <div class="l" style="color:var(--muted);text-transform:uppercase;font-size:12px;letter-spacing:.05em">Score on missed questions</div>
        <div class="score ${cls}">${pct}%</div>
        <div class="stats">
          <div class="stat"><div class="n">${total}</div><div class="l">Practiced</div></div>
          <div class="stat"><div class="n">${firstCorrect}</div><div class="l">Correct first try</div></div>
          <div class="stat"><div class="n">${attempts}</div><div class="l">Total attempts</div></div>
          <div class="stat"><div class="n">${overall}%</div><div class="l">Overall accuracy</div></div>
        </div>
        <div class="actions" style="justify-content:center">
          <button class="primary" id="againBtn">↻ Practice these again</button>
          <button class="secondary" id="backFullBtn">← Back to full quiz</button>
        </div>
      </div>`;
    document.getElementById('againBtn').addEventListener('click',startFocus);
    document.getElementById('backFullBtn').addEventListener('click',exitFocus);
    return;
  }

  const missBtn = missedFirst.size
    ? `<button class="secondary" id="practiceMissBtn">⚑ Practice ${missedFirst.size} missed question${missedFirst.size===1?'':'s'} →</button>`
    : '';
  document.getElementById('quiz').innerHTML=`
    <div class="summary">
      <h2>🎉 Quiz Complete!</h2>
      <div class="l" style="color:var(--muted);text-transform:uppercase;font-size:12px;letter-spacing:.05em">First-attempt score</div>
      <div class="score ${cls}">${pct}%</div>
      <div class="stats">
        <div class="stat"><div class="n">${total}</div><div class="l">Questions answered</div></div>
        <div class="stat"><div class="n">${firstCorrect}</div><div class="l">Correct first try</div></div>
        <div class="stat"><div class="n">${total-firstCorrect}</div><div class="l">Missed first try</div></div>
        <div class="stat"><div class="n">${attempts}</div><div class="l">Total attempts</div></div>
        <div class="stat"><div class="n">${overall}%</div><div class="l">Overall accuracy</div></div>
      </div>
      <div class="actions" style="justify-content:center">
        <button class="primary" id="retakeBtn">↻ Retake quiz</button>
        ${missBtn}
      </div>
    </div>`;
  document.getElementById('retakeBtn').addEventListener('click',freshStart);
  const pm=document.getElementById('practiceMissBtn');
  if(pm) pm.addEventListener('click',startFocus);
}

// ---- improvement areas / focused practice ----
function setFocusBanner(on){
  const note=document.getElementById('filterNote');
  if(on){
    note.className='focusbanner';
    note.style.display='flex';
    note.innerHTML=`<span>⚑ <strong>Focused practice</strong> — drilling the ${total} question${total===1?'':'s'} you missed.</span>
       <button class="iconbtn" id="exitFocusBtn">← Back to full quiz</button>`;
    const b=document.getElementById('exitFocusBtn'); if(b) b.addEventListener('click',exitFocus);
  } else if(note.classList.contains('focusbanner')){
    note.className='filternote'; note.style.display='none'; note.innerHTML='';
  }
}

function showImprovement(){
  const miss=[...missedFirst].map(id=>QUESTIONS[id]).filter(Boolean);
  document.getElementById('restartBtn').style.display='none';
  document.getElementById('improveBtn').style.display='none';
  setFocusBanner(false);
  if(miss.length===0){
    document.getElementById('quiz').innerHTML=`
      <div class="setup">
        <h2 style="margin:0 0 12px">⚑ Improvement areas</h2>
        <div class="emptybox">Nothing to review yet — you haven't missed any questions on the first try. Keep going! 💪</div>
        <div class="actions" style="margin-top:20px"><button class="secondary" id="backBtn">← Back to quiz</button></div>
      </div>`;
    document.getElementById('backBtn').addEventListener('click',returnToQuiz);
    return;
  }
  const items=miss.map(q=>`<li>${esc(q.question)}${q.type==='multiple'?'<span class="mtype">multi</span>':''}</li>`).join('');
  document.getElementById('quiz').innerHTML=`
    <div class="setup">
      <h2 style="margin:0 0 6px">⚑ Improvement areas</h2>
      <p class="lead">${miss.length} question${miss.length===1?'':'s'} you answered incorrectly on the first try. Run a focused practice test on just these.</p>
      <ol class="misslist">${items}</ol>
      <div class="actions">
        <button class="primary" id="focusBtn">Start focused practice →</button>
        <button class="secondary" id="backBtn">← Back to quiz</button>
      </div>
    </div>`;
  document.getElementById('focusBtn').addEventListener('click',startFocus);
  document.getElementById('backBtn').addEventListener('click',returnToQuiz);
}

function startFocus(){
  const items=[...missedFirst].map(id=>QUESTIONS[id]).filter(Boolean);
  if(items.length===0){ showImprovement(); return; }
  focusActive=true;
  attempts=0;correctAttempts=0;firstCorrect=0;
  firstSeen=new Set();answeredUnique=new Set();current=null;locked=false;
  items.forEach(q=>q.firstAttempt=true);
  queue=shuffle(items.slice());
  total=queue.length;
  document.getElementById('restartBtn').style.display='none';
  document.getElementById('improveBtn').style.display='none';
  setFocusBanner(true);
  next();
}

// leave focus mode and reload the main quiz from the saved session (state was mutated by focus)
function exitFocus(){
  focusActive=false;
  setFocusBanner(false);
  ACTIVE=QUESTIONS;
  total=QUESTIONS.length;
  boot();
}

// return to the main quiz from the (non-mutating) improvement intro screen
function returnToQuiz(){
  document.getElementById('restartBtn').style.display='inline-block';
  document.getElementById('improveBtn').style.display='inline-block';
  updateImproveBtn();
  if(!current){ next(); return; }
  if(locked){ next(); return; }
  render(); updateMeta();
}

function confirmRestart(){
  if(confirm("Start the quiz over? Your current progress and saved session will be cleared.")){
    freshStart();
  }
}

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

// ---- subjects + topic search / filter ----
const SUBJECTS=[
  {key:'git',label:'Git & Version Control',kw:['version control','distributed','git ','staging','snapshot of a repository']},
  {key:'repos',label:'Repositories',kw:['repositor','readme','wiki','pinned','.github','default branch']},
  {key:'branches',label:'Branches & Merging',kw:['branch','merge','merging','rebase']},
  {key:'commits',label:'Commits',kw:['commit']},
  {key:'pr',label:'Pull Requests',kw:['pull request','draft pull','code review','reviewer','status check','closes #']},
  {key:'issues',label:'Issues',kw:['issue']},
  {key:'discussions',label:'Discussions',kw:['discussion']},
  {key:'actions',label:'Actions / CI-CD',kw:['github actions','workflow','ci/cd','continuous integration','runner']},
  {key:'pages',label:'GitHub Pages',kw:['github pages','static site','static website']},
  {key:'forks',label:'Forks & Cloning',kw:['fork','clone','cloning']},
  {key:'collab',label:'Collaboration & Access',kw:['collaborator','permission','write access','read access','codeowners','invite']},
  {key:'org',label:'Organizations & Teams',kw:['organization','team','security manager','innersource','inner source','member']},
  {key:'plans',label:'Accounts, Plans & Billing',kw:['pricing','billing','free plan','github pro','enterprise','team plan','marketplace','plan for']},
  {key:'sponsors',label:'Open Source & Sponsors',kw:['open source','sponsor','license','community']},
  {key:'security',label:'Security & Auth',kw:['security','secret scanning','codeql','dependabot','vulnerab','branch protection','2fa','two-factor','multi-factor','authentication','personal access token','passkey','security key']},
  {key:'copilot',label:'GitHub Copilot',kw:['copilot']},
  {key:'apps',label:'Desktop, Mobile & CLI',kw:['github desktop','github mobile','github cli','command line','gui application']},
  {key:'projects',label:'Projects & Planning',kw:['github projects','project board','project template','task list','project as a template']},
  {key:'markdown',label:'Markdown & Writing',kw:['markdown','slash command','task list']},
  {key:'profile',label:'Profile & Social',kw:['following','follow ','followers','profile','gist']},
  {key:'insights',label:'Insights & Activity',kw:['insights','pulse','graph','contribution']}
];
const SUBJECT_LABEL={general:'General / Other'};
SUBJECTS.forEach(s=>SUBJECT_LABEL[s.key]=s.label);

let selectedSubjects=new Set();
let searchWords=[];

function questionHaystack(q){
  let s=(q.question||"");
  for(const o of (q.options||[])) s+=" "+(o.text||"");
  if(q.explanation) s+=" "+q.explanation;
  return s.toLowerCase();
}

function initSubjects(){
  QUESTIONS.forEach(q=>{
    const h=questionHaystack(q);
    const tags=[];
    for(const s of SUBJECTS){ if(s.kw.some(k=>h.includes(k))) tags.push(s.key); }
    if(tags.length===0) tags.push('general');
    q._subjects=tags;
  });
  const counts={};
  QUESTIONS.forEach(q=>q._subjects.forEach(k=>counts[k]=(counts[k]||0)+1));
  let html='';
  for(const s of SUBJECTS){
    const c=counts[s.key]||0; if(!c) continue;
    html+=`<li><label><input type="checkbox" value="${s.key}"><span class="lbl">${esc(s.label)}</span><span class="cnt">${c}</span></label></li>`;
  }
  if(counts['general']) html+=`<li><label><input type="checkbox" value="general"><span class="lbl">General / Other</span><span class="cnt">${counts['general']}</span></label></li>`;
  const ul=document.getElementById('subList');
  ul.innerHTML=html;
  ul.addEventListener('change',e=>{
    const cb=e.target.closest('input'); if(!cb) return;
    if(cb.checked) selectedSubjects.add(cb.value); else selectedSubjects.delete(cb.value);
    cb.closest('label').classList.toggle('on',cb.checked);
    recomputeFilter();
  });
  document.getElementById('subAll').addEventListener('click',()=>{
    selectedSubjects.clear();
    document.querySelectorAll('#subList input').forEach(c=>{c.checked=true;selectedSubjects.add(c.value);c.closest('label').classList.add('on');});
    recomputeFilter();
  });
  document.getElementById('subClear').addEventListener('click',resetFilters);
}

function applyFilter(term){
  term=(term||"").trim();
  searchWords = term ? term.toLowerCase().split(/\s+/).filter(Boolean) : [];
  recomputeFilter();
}

function resetFilters(){
  selectedSubjects.clear();
  searchWords=[];
  const si=document.getElementById('searchInput'); if(si) si.value='';
  document.querySelectorAll('#subList input').forEach(c=>{c.checked=false;c.closest('label').classList.remove('on');});
  recomputeFilter();
}

function recomputeFilter(){
  const note=document.getElementById('filterNote');
  const clr=document.getElementById('searchClear');
  const subs=[...selectedSubjects];
  if(subs.length===0 && searchWords.length===0){
    filterActive=false; ACTIVE=QUESTIONS; total=QUESTIONS.length;
    clr.style.display='none'; note.style.display='none'; note.innerHTML='';
    boot(); return;
  }
  const matches=QUESTIONS.filter(q=>{
    if(subs.length && !subs.some(k=>q._subjects.includes(k))) return false;
    if(searchWords.length){ const h=questionHaystack(q); if(!searchWords.every(w=>h.includes(w))) return false; }
    return true;
  });
  filterActive=true;
  focusActive=false;
  clr.style.display='inline-block';
  note.style.display='block';
  const parts=[];
  if(subs.length) parts.push('Subjects: '+subs.map(k=>esc(SUBJECT_LABEL[k]||k)).join(', '));
  if(searchWords.length) parts.push('matching “'+esc(searchWords.join(' '))+'”');
  if(matches.length===0){
    note.className='filternote none';
    note.innerHTML=`No questions found — ${parts.join(' · ')}. <a href="#" id="clrLink">Show all questions</a>.`;
    document.getElementById('restartBtn').style.display='none';
    document.getElementById('improveBtn').style.display='none';
    document.getElementById('counter').textContent='';
    document.getElementById('remaining').textContent='';
    document.getElementById('prog').style.width='0%';
    document.getElementById('quiz').innerHTML='<div class="resume"><p>No matching questions for that selection.</p></div>';
    const cl=document.getElementById('clrLink'); if(cl) cl.addEventListener('click',e=>{e.preventDefault();resetFilters();});
    return;
  }
  note.className='filternote';
  note.innerHTML=`Showing <strong>${matches.length}</strong> of ${QUESTIONS.length} questions — ${parts.join(' · ')}.`;
  ACTIVE=matches;
  attempts=0;correctAttempts=0;firstCorrect=0;
  firstSeen=new Set();answeredUnique=new Set();current=null;locked=false;
  total=ACTIVE.length;
  ACTIVE.forEach(q=>q.firstAttempt=true);
  queue=shuffle(ACTIVE.slice());
  document.getElementById('restartBtn').style.display='inline-block';
  document.getElementById('improveBtn').style.display='none';
  next();
}

document.getElementById('searchInput').addEventListener('keydown',e=>{
  if(e.key==='Enter'){ e.preventDefault(); applyFilter(e.target.value); }
});
document.getElementById('searchClear').addEventListener('click',resetFilters);

document.getElementById('restartBtn').addEventListener('click',confirmRestart);
document.getElementById('improveBtn').addEventListener('click',showImprovement);
document.addEventListener('keydown',e=>{
  if(e.target && e.target.id==='searchInput') return;   // let the search box handle Enter
  if(e.key==='Enter'){
    const sub=document.getElementById('submit');
    const nb=document.getElementById('nextBtn');
    if(nb&&nb.style.display!=='none'){e.preventDefault();nb.click();}
    else if(sub&&!sub.disabled&&sub.style.display!=='none'){e.preventDefault();sub.click();}
  }
});

initSubjects();
boot();
</script>
